name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  APP_NAME: gitspark
  APP_DISPLAY_NAME: GitSpark
  MACOS_BUNDLE_ID: com.github.samro.gitspark

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: gitspark
            archive_ext: tar.gz
          - label: macos-universal
            os: macos-15
            target: universal2-apple-darwin
            binary: gitspark
            archive_ext: dmg
          - label: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            binary: gitspark.exe
            archive_ext: zip
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libwayland-dev \
            libasound2-dev \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Build release binary
        if: runner.os != 'macOS'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build universal macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin

          mkdir -p target/universal2-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/${{ matrix.binary }} \
            target/aarch64-apple-darwin/release/${{ matrix.binary }} \
            -output target/universal2-apple-darwin/release/${{ matrix.binary }}
          lipo -info target/universal2-apple-darwin/release/${{ matrix.binary }}

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
          BIN_NAME: ${{ matrix.binary }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          archive_base="${APP_NAME}-${RELEASE_TAG}-${TARGET}"
          stage_root="dist/${archive_base}"
          mkdir -p "$stage_root"
          cp "target/${TARGET}/release/${BIN_NAME}" "$stage_root/"
          if [[ -f README.md ]]; then
            cp README.md "$stage_root/"
          fi
          tar -C dist -czf "dist/${archive_base}.${ARCHIVE_EXT}" "${archive_base}"
          rm -rf "$stage_root"

      - name: Package macOS app bundle and DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
          BIN_NAME: ${{ matrix.binary }}
        run: |
          version="${RELEASE_TAG#v}"
          archive_base="${APP_NAME}-${RELEASE_TAG}-${TARGET}"
          app_bundle_name="${APP_DISPLAY_NAME}.app"
          bundle_root="dist/${archive_base}/${app_bundle_name}"
          contents_dir="${bundle_root}/Contents"
          macos_dir="${contents_dir}/MacOS"
          resources_dir="${contents_dir}/Resources"
          dmg_root="dist/dmg-root"

          mkdir -p "$macos_dir" "$resources_dir" "$dmg_root"
          cp "target/${TARGET}/release/${BIN_NAME}" "${macos_dir}/${BIN_NAME}"
          chmod +x "${macos_dir}/${BIN_NAME}"

          cat > "${contents_dir}/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleExecutable</key>
            <string>${BIN_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>${MACOS_BUNDLE_ID}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${version}</string>
            <key>CFBundleVersion</key>
            <string>${version}</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          cp -R "$bundle_root" "$dmg_root/"
          if [[ -f README.md ]]; then
            cp README.md "$dmg_root/"
          fi
          ln -s /Applications "$dmg_root/Applications"

          hdiutil create \
            -volname "${APP_DISPLAY_NAME}" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "dist/${archive_base}.dmg"

          file "dist/${archive_base}.dmg"
          rm -rf "dist/${archive_base}" "$dmg_root"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
          BIN_NAME: ${{ matrix.binary }}
        run: |
          $archiveBase = "$env:APP_NAME-$env:RELEASE_TAG-$env:TARGET"
          $stageRoot = Join-Path "dist" $archiveBase
          New-Item -ItemType Directory -Force -Path $stageRoot | Out-Null
          Copy-Item "target\$env:TARGET\release\$env:BIN_NAME" $stageRoot
          if (Test-Path README.md) {
            Copy-Item README.md $stageRoot
          }
          $archivePath = Join-Path "dist" "$archiveBase.zip"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath
          }
          Compress-Archive -Path $stageRoot -DestinationPath $archivePath
          Remove-Item -Recurse -Force $stageRoot

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GH_REPO" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi
